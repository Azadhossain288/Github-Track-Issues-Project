<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 w-full max-w-[400px]">
        <div class="text-center mb-8">
            <div class="flex justify-center mb-4">
                <i class="fa-brands fa-github text-7xl text-[#1e293b]"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">GitHub Issues Tracker</h1>
            <p class="text-sm text-slate-400 mt-1">Sign in to manage your issues</p>
        </div>

        <form id="login-form" class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <input id="username" type="text" placeholder="Enter Username" 
                    class="input input-bordered w-full rounded-lg focus:outline-indigo-500 bg-slate-50 border-slate-200" required />
                <p class="text-[10px] text-indigo-600 mt-1 font-medium">Default: admin</p>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input id="password" type="password" placeholder="Enter Password" 
                    class="input input-bordered w-full rounded-lg focus:outline-indigo-500 bg-slate-50 border-slate-200" required />
                <p class="text-[10px] text-indigo-600 mt-1 font-medium">Default: admin123</p>
            </div>

            <button type="submit" class="btn bg-[#422ad5] hover:bg-[#3622b0] text-white w-full border-none rounded-lg text-lg normal-case mt-2">
                Sign In
            </button>
        </form>

        <div class="divider text-xs text-slate-400 my-8 uppercase">OR</div>

        <div class="bg-slate-50 rounded-xl p-6 text-center border border-slate-100">
            <p class="text-xs text-slate-400 font-bold uppercase mb-3">Demo Credentials:</p>
            <div class="text-slate-700 font-bold text-sm">
                <p>Username: <span class="text-slate-900">admin</span></p>
                <p>Password: <span class="text-slate-900">admin123</span></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("login-form").addEventListener("submit", (e) => {
            e.preventDefault();
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            
            if (user === "admin" && pass === "admin123") {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html"; 
            } else {
                alert("Wrong Username or Password! Check demo credentials.");
            }
        });
    </script>
</body>
</html>
